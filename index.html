<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>京都エコごはんガイド — 環境に配慮した飲食店・カフェガイド</title>
<meta name="description" content="京都市内の環境に配慮したレストラン・カフェを、地産地消・フードロス削減・プラントベースなど5つの視点で紹介するガイドです。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">

<section class="hero">
  <div class="hero-inner">
    <div class="hero-main">
      <h1>環境にやさしいお店を、<br>京都で見つける。</h1>
      <p class="hero-lead">
        京都市内のレストラン・カフェを実際に調査し、地産地消やフードロス削減など
        5つの視点で環境への取り組みをまとめました。気になる条件で絞り込んで、
        今日のごはんを選んでみてください。
      </p>
      <div class="hero-stats" id="heroStats"></div>
      <p class="views-label">気になる取り組みから探す</p>
      <div class="hero-views" id="heroViews"></div>
      <p class="views-more"><a href="sdg12.html">5つの視点についてくわしく知る →</a></p>
    </div>
    <p class="tanzaku"><span>食べることから、</span><span>はじめるエコ。</span></p>
  </div>
</section>

<nav class="filters" aria-label="店舗の絞り込み">
  <div class="filters-inner">
    <div class="filters-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input type="search" id="searchInput" placeholder="店名・キーワードで探す" aria-label="店名・キーワードで探す">
      </div>
      <div class="seg" role="group" aria-label="カテゴリー" id="catSeg">
        <button type="button" data-cat="all" aria-pressed="true">すべて</button>
        <button type="button" data-cat="restaurant" aria-pressed="false">レストラン</button>
        <button type="button" data-cat="cafe" aria-pressed="false">カフェ</button>
      </div>
      <select id="areaSelect" aria-label="エリアで絞り込む">
        <option value="all">すべてのエリア</option>
      </select>
    </div>
    <div class="filters-row">
      <div class="tag-chips" id="tagChips">
        <span class="chips-label">エコの取り組み：</span>
      </div>
      <button type="button" class="clear-btn" id="clearBtn">条件をクリア</button>
    </div>
  </div>
</nav>

<main class="results">
  <p class="result-count" id="resultCount" role="status"></p>
  <div class="card-grid" id="cardGrid"></div>
  <div class="empty" id="emptyState">
    <span class="empty-mark" aria-hidden="true">空</span>
    <p>条件に合うお店が見つかりませんでした。<br>条件を減らして、もう一度お試しください。</p>
    <button type="button" id="emptyResetBtn">条件をクリアする</button>
  </div>
</main>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalName" id="modalBox">
    <div class="modal-banner" id="modalBanner">
      <img id="modalPhoto" alt="" hidden>
      <span class="initial" id="modalInitial" aria-hidden="true"></span>
      <button type="button" class="modal-close" id="modalClose" aria-label="閉じる">✕</button>
    </div>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<script src="js/layout.js"></script>
<script src="data/stores.js"></script>
<script src="js/app.js"></script>
</body>
</html>
